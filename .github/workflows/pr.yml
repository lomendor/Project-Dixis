name: quality-gates

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}-quality-gates
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: project_dixis_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Guard - block secret leaks in diff
        run: ./scripts/guard-no-secrets-diff.sh

      # Frontend checks
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml"
      - name: Install
        run: pnpm i --no-frozen-lockfile
        working-directory: frontend
      - name: Generate Prisma Client
        run: pnpm db:gen
        working-directory: frontend
      - name: Typecheck
        run: pnpm typecheck
        working-directory: frontend
      - name: Unit tests (Vitest)
        run: pnpm test:unit
        working-directory: frontend
      - name: Build
        run: pnpm build
        working-directory: frontend

      # Backend scoping tests (ownership guardrail)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, xml, ctype, json, tokenizer, openssl, curl, fileinfo
          coverage: none
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-
            composer-
      - name: Install backend deps
        run: composer install --no-interaction --prefer-dist
        working-directory: backend
      - name: Copy .env
        run: cp .env.example .env
        working-directory: backend
      - name: Generate app key
        run: php artisan key:generate
        working-directory: backend
      # NOTE: do NOT overwrite the committed backend/.env.testing — it holds the
      # test APP_KEY/JWT config the suite needs (admin JWT tests 401 without it).
      # Real env vars below override its local-machine DB values (same pattern
      # as backend-ci.yml, which runs this exact suite green nightly).
      - name: Migrate database
        run: php artisan migrate:fresh --seed --env=testing
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          DB_DATABASE: project_dixis_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
      # Excluded group (see AGENT-STATE "Test quarantine"):
      # - external-provider: ACS courier integration tests, need provider creds.
      # (admin-jwt-rework was fixed and un-quarantined — TEST-FIX-ADMIN-JWT pass)
      - name: Run backend test suite
        run: php artisan test --env=testing --exclude-group=external-provider
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          DB_DATABASE: project_dixis_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

  heavy-checks:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'ci:light')
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml"
      - name: Install
        run: pnpm i --no-frozen-lockfile
        working-directory: frontend
      # Honest boot smoke (hard gate): build the PR's code, start it, prove
      # the server boots and key pages render 200. Replaces the previous
      # Playwright step which ran from the wrong directory, never executed a
      # single test, and was soft-failed ("|| echo") since introduction.
      # Real Playwright smoke gating is tracked as a separate pass (TEST-INFRA).
      - name: Prisma setup (CI schema)
        run: |
          pnpm run ci:gen
          pnpm run ci:migrate
          pnpm run ci:seed
        working-directory: frontend
      - name: Build (production profile)
        run: pnpm run build:ci
        working-directory: frontend
      - name: Boot smoke — server starts, key pages render 200
        run: |
          pnpm run start:ci &
          npx wait-on http://127.0.0.1:3001/api/healthz --timeout 120000
          fail=0
          for path in /api/healthz / /products; do
            code=$(curl -s --max-time 60 -o /dev/null -w '%{http_code}' "http://127.0.0.1:3001$path")
            echo "GET $path -> $code"
            [ "$code" = "200" ] || fail=1
          done
          exit $fail
        working-directory: frontend
